<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - 3D Models Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>Join 3D Models</h1>
                <p>Create account to upload & share your models</p>
            </div>

            <!-- ✅ GOOGLE SIGN-UP BUTTON (Creates account automatically) -->
            <button id="googleSignUp" class="btn btn-google">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.83l2.66-2.07z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Continue with Google</span>
            </button>

            <!-- Divider -->
            <div class="divider">
                <span>or create account with email</span>
            </div>

            <!-- Email/Password Registration -->
            <form id="registerForm" class="email-form">
                <div class="input-group">
                    <label for="displayName">Full Name</label>
                    <input type="text" id="displayName" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••">
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••">
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
            <p>Creating your account...</p>
        </div>
    </div>

    <script type="module">
        import { 
            googleSignIn, 
            emailSignUp, 
            onAuthStateChanged, 
            auth 
        } from './auth.js';

        // Redirect if already signed in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        // Google Sign-Up (same as Sign-In - Firebase auto-creates)
        document.getElementById('googleSignUp').addEventListener('click', async () => {
            const loading = document.getElementById('loadingOverlay');
            const errorMsg = document.getElementById('errorMessage');
            
            loading.style.display = 'flex';
            errorMsg.style.display = 'none';
            
            try {
                await googleSignIn(); // ✅ Same function works for both!
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Google Sign-Up failed:', error);
                errorMsg.textContent = `Sign-up failed: ${error.message}`;
                errorMsg.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        });

        // Email Registration
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const displayName = document.getElementById('displayName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const loading = document.getElementById('loadingOverlay');
            const errorMsg = document.getElementById('errorMessage');
            
            // Validation
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match!';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters!';
                errorMsg.style.display = 'block';
                return;
            }
            
            loading.style.display = 'flex';
            errorMsg.style.display = 'none';
            
            try {
                await emailSignUp(email, password);
                // Update user profile with display name
                // await updateProfile(auth.currentUser, { displayName });
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Email Sign-Up failed:', error);
                errorMsg.textContent = `Registration failed: ${error.message}`;
                errorMsg.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>

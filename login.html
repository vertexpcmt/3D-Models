<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vertex PCMT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0c0c1a 0%,#1a1a2e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;color:#fff;}
        .auth-container{max-width:450px;width:100%;background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));backdrop-filter:blur(30px);border-radius:25px;padding:3rem;border:1px solid rgba(255,255,255,0.2);box-shadow:0 25px 50px rgba(0,0,0,0.5);}
        .logo{text-align:center;margin-bottom:2.5rem;}
        .logo i{font-size:4rem;color:#00d4ff;margin-bottom:1rem;display:block;}
        .logo h1{font-size:2.2rem;font-weight:800;background:linear-gradient(45deg,#00d4ff,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .form-group{position:relative;margin-bottom:2rem;}
        .form-group input{width:100%;padding:18px 20px 18px 50px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:15px;color:#fff;font-size:1.1rem;transition:all 0.3s;}
        .form-group input::placeholder{color:rgba(255,255,255,0.6);}
        .form-group input:focus{outline:none;border-color:#00d4ff;box-shadow:0 0 20px rgba(0,212,255,0.3);background:rgba(255,255,255,0.15);}
        .form-group i{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#00d4ff;font-size:1.2rem;}
        .login-btn{width:100%;padding:18px;background:linear-gradient(45deg,#00d4ff,#00aaff);color:#fff;border:none;border-radius:15px;font-size:1.3rem;font-weight:700;cursor:pointer;transition:all 0.4s;text-transform:uppercase;letter-spacing:1px;}
        .login-btn:hover{transform:translateY(-3px);box-shadow:0 15px 35px rgba(0,212,255,0.5);}
        .google-btn{display:flex;align-items:center;justify-content:center;gap:1rem;width:100%;padding:16px;background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.2);border-radius:15px;font-size:1.1rem;cursor:pointer;transition:all 0.3s;margin-top:1rem;}
        .google-btn:hover{background:rgba(255,255,255,0.15);border-color:#00d4ff;transform:translateY(-2px);}
        .links{text-align:center;margin-top:2rem;}
        .links a{color:#00d4ff;text-decoration:none;font-weight:600;transition:color 0.3s;margin:0 1rem;}
        .links a:hover{color:#fff;}
        .loading{display:none;text-align:center;padding:2rem;}
        .loading i{font-size:2.5rem;color:#00d4ff;}
        @media(max-width:480px){.auth-container{padding:2rem 1.5rem;}}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <i class="fas fa-sign-in-alt"></i>
            <h1>Vertex PCMT</h1>
            <p style="color:rgba(255,255,255,0.7);">Member Login</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">🔐 Sign In</button>
        </form>
        
        <div style="text-align:center;margin:2rem 0;color:rgba(255,255,255,0.6);">
            <span style="background:rgba(26,26,46,0.8);padding:0 1rem;">or</span>
        </div>
        
        <button id="googleLogin" class="google-btn">
            <i class="fab fa-google"></i> Continue with Google
        </button>
        
        <div class="links">
            <a href="register.html">📝 Create Account</a>
            <a href="index.html">← Back to Store</a>
        </div>
    </div>

    <div id="loading" class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Signing you in...</p>
    </div>

    <!-- Firebase Magic -->
    <script type="module">
        import { signInWithEmailAndPassword, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        const auth = window.auth;
        const provider = window.googleProvider;
        const loadingEl = document.getElementById('loading');
        const formEl = document.getElementById('loginForm');

        // Email Login
        formEl.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            showLoading();
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('❌ ' + error.message);
                hideLoading();
            }
        });

        // Google Login
        document.getElementById('googleLogin').addEventListener('click', async () => {
            showLoading();
            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('❌ ' + error.message);
                hideLoading();
            }
        });

        function showLoading() {
            formEl.style.display = 'none';
            loadingEl.style.display = 'block';
        }
        function hideLoading() {
            formEl.style.display = 'block';
            loadingEl.style.display = 'none';
        }

        // Auto redirect if logged in
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>

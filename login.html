<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 3D Models Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>3D Models</h1>
                <p>Sign in to access your dashboard</p>
            </div>

            <!-- ✅ GOOGLE SIGN-IN BUTTON (Most Secure) -->
            <button id="googleSignIn" class="btn btn-google">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.83l2.66-2.07z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Continue with Google</span>
            </button>

            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- Email/Password (Optional - Less Secure) -->
            <form id="emailForm" class="email-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="register.html">Sign up</a></p>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
            <p>Signing you in...</p>
        </div>
    </div>

    <!-- Firebase SDK (CDN for simplicity) -->
    <script type="module">
        import { 
            googleSignIn, 
            emailSignIn, 
            onAuthStateChanged, 
            auth 
        } from './auth.js';

        // Check if already signed in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        // Google Sign-In
        document.getElementById('googleSignIn').addEventListener('click', async () => {
            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            
            try {
                await googleSignIn();
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Google Sign-In failed:', error);
                alert(`Sign-in failed: ${error.message}`);
            } finally {
                loading.style.display = 'none';
            }
        });

        // Email Sign-In
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loading = document.getElementById('loadingOverlay');
            
            loading.style.display = 'flex';
            
            try {
                await emailSignIn(email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Email Sign-In failed:', error);
                alert(`Sign-in failed: ${error.message}`);
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
